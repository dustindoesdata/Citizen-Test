<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#1A1A2E">
<title>Leaderboard — The Citizen Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap');
:root{
  --navy:#1A1A2E; --blue:#3C3B6E; --red:#B22234;
  --gold:#C9A84C; --cream:#FAF7F0; --ink:#1A1A2E;
  --muted:#6B6B7B; --border:#E2DDD6;
  --correct:#2D6A4F; --wrong:#A4161A;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh;}

header{background:var(--navy);padding:clamp(28px,5vw,44px) 20px clamp(20px,4vw,32px);text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.03) 40px,rgba(255,255,255,.03) 41px);}
.flag-stripe{display:flex;height:6px;width:100%;position:absolute;top:0;left:0;}
.flag-stripe span{flex:1;}
.flag-stripe span:nth-child(odd){background:var(--red);}
.flag-stripe span:nth-child(even){background:#fff;}
.stars{color:var(--gold);font-size:clamp(.9rem,3vw,1.1rem);letter-spacing:clamp(3px,1.5vw,8px);margin-bottom:10px;position:relative;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,2.6rem);font-weight:900;color:#fff;margin-bottom:6px;position:relative;line-height:1.2;}
header p{color:rgba(255,255,255,.7);font-size:clamp(.8rem,2.5vw,.95rem);font-style:italic;position:relative;}

.container{max-width:860px;margin:0 auto;padding:clamp(24px,4vw,44px) clamp(14px,4vw,28px) 80px;}

/* ── Stats bar ── */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:32px;}
.stat-box{background:#fff;border-radius:8px;padding:16px 12px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);}
.stat-box .sv{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,2rem);font-weight:900;line-height:1;}
.stat-box .sl{font-size:clamp(.6rem,2vw,.7rem);text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:4px;}
.stat-box.s-total .sv{color:var(--blue);}
.stat-box.s-pass .sv{color:var(--correct);}
.stat-box.s-fail .sv{color:var(--wrong);}
.stat-box.s-best .sv{color:var(--gold);}

/* ── Controls ── */
.controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.controls label{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.filter-btn{background:#fff;border:2px solid var(--border);border-radius:6px;padding:7px 16px;font-family:'Source Serif 4',serif;font-size:.85rem;color:var(--ink);cursor:pointer;transition:all .18s;}
.filter-btn:hover{border-color:var(--blue);}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.sort-select{background:#fff;border:2px solid var(--border);border-radius:6px;padding:7px 14px;font-family:'Source Serif 4',serif;font-size:.85rem;color:var(--ink);outline:none;cursor:pointer;margin-left:auto;}
.sort-select:focus{border-color:var(--blue);}

/* ── Table wrapper (horizontal scroll on mobile) ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,.07);}
table{width:100%;border-collapse:collapse;background:#fff;min-width:480px;}
thead{background:var(--navy);}
thead th{color:#fff;font-family:'Playfair Display',serif;font-size:clamp(.8rem,2.5vw,.9rem);font-weight:700;padding:14px 16px;text-align:left;white-space:nowrap;}
thead th:first-child{border-radius:10px 0 0 0;}
thead th:last-child{border-radius:0 10px 0 0;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:#F5F2EC;}
tbody tr:last-child{border-bottom:none;}
td{padding:13px 16px;font-size:clamp(.85rem,2.8vw,.95rem);vertical-align:middle;}

/* ── Rank cell ── */
.rank{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1rem,3vw,1.2rem);color:var(--muted);text-align:center;}
.rank.gold{color:var(--gold);}
.rank.silver{color:#A0A8B0;}
.rank.bronze{color:#B87333;}

/* ── Name cell ── */
.name-cell{font-weight:600;color:var(--ink);}
.date-cell{color:var(--muted);font-size:.82rem;}

/* ── Score cell ── */
.score-pill{display:inline-block;padding:3px 10px;border-radius:12px;font-weight:700;font-size:.88rem;}
.score-pill.pass{background:#D8F3DC;color:var(--correct);}
.score-pill.fail{background:#FFDAD6;color:var(--wrong);}

/* ── Time cell ── */
.time-cell{font-family:'Playfair Display',serif;font-weight:700;color:var(--blue);}

/* ── Empty state ── */
.empty{background:#fff;border-radius:10px;padding:60px 24px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid var(--border);}
.empty-icon{font-size:3rem;margin-bottom:16px;}
.empty h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--blue);margin-bottom:10px;}
.empty p{color:var(--muted);font-size:.95rem;line-height:1.7;}

/* ── Action buttons ── */
.action-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px;}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:0 clamp(20px,4vw,36px);min-height:48px;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:background .2s;}
.btn-primary:hover{background:#2d2c5c;}
.btn-danger{background:transparent;color:var(--wrong);border:2px solid var(--wrong);padding:0 clamp(20px,4vw,36px);min-height:48px;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:var(--wrong);color:#fff;}

footer{text-align:center;padding:20px;color:var(--muted);font-size:.8rem;font-style:italic;border-top:1px solid var(--border);margin-top:48px;}
footer a{color:var(--blue);}

/* ── Confirm overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.confirm-box{background:#fff;border-radius:12px;padding:36px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.confirm-box h3{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--ink);margin-bottom:12px;}
.confirm-box p{color:var(--muted);font-size:.93rem;line-height:1.65;margin-bottom:24px;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
</style>
</head>
<body>

<header>
  <div class="flag-stripe"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div class="stars">★ ★ ★ ★ ★</div>
  <h1>Leaderboard</h1>
  <p>The Citizen Test — All Results</p>
</header>

<div class="container">
  <div class="stats-bar" id="stats-bar"></div>

  <div class="controls">
    <label>Show:</label>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('pass',this)">Passed</button>
    <button class="filter-btn" onclick="setFilter('fail',this)">Failed</button>
    <select class="sort-select" onchange="setSort(this.value)">
      <option value="score_desc">Sort: Score (High → Low)</option>
      <option value="score_asc">Sort: Score (Low → High)</option>
      <option value="time_asc">Sort: Time (Fastest first)</option>
      <option value="time_desc">Sort: Time (Slowest first)</option>
      <option value="date_desc">Sort: Date (Newest first)</option>
      <option value="date_asc">Sort: Date (Oldest first)</option>
    </select>
  </div>

  <div id="board-wrap"></div>

  <div class="action-row">
    <a href="./index.html" class="btn-primary">← Take the Test</a>
    <button class="btn-danger" onclick="confirmClear()">Clear All Results</button>
  </div>
</div>

<footer>
  Results stored locally in your browser. <a href="./index.html">Take the Citizen Test</a> · <a href="./study-guide.md">Study guide</a>
</footer>

<div class="overlay" id="confirm-overlay" style="display:none;">
  <div class="confirm-box">
    <h3>Clear All Results?</h3>
    <p>This will permanently delete every entry from the leaderboard. This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-primary" onclick="doClear()">Yes, Clear</button>
      <button class="btn-danger" onclick="cancelClear()">Cancel</button>
    </div>
  </div>
</div>

<script>
const KEY='civics_leaderboard';
let filter='all', sortBy='score_desc';

function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }
  catch(e){ return []; }
}

function fmtTime(s){
  const m=Math.floor(s/60),sec=s%60;
  return m+':'+(sec<10?'0':'')+sec;
}

function fmtDate(iso){
  try{
    const d=new Date(iso);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }catch(e){ return '—'; }
}

function rankLabel(i){
  if(i===0)return '<span class="rank gold">🥇</span>';
  if(i===1)return '<span class="rank silver">🥈</span>';
  if(i===2)return '<span class="rank bronze">🥉</span>';
  return '<span class="rank">'+(i+1)+'</span>';
}

function sortEntries(arr){
  const a=[...arr];
  switch(sortBy){
    case 'score_desc': return a.sort((x,y)=>y.score-x.score||(x.time-y.time));
    case 'score_asc':  return a.sort((x,y)=>x.score-y.score||(y.time-x.time));
    case 'time_asc':   return a.sort((x,y)=>x.time-y.time||(y.score-x.score));
    case 'time_desc':  return a.sort((x,y)=>y.time-x.time||(y.score-x.score));
    case 'date_desc':  return a.sort((x,y)=>new Date(y.date)-new Date(x.date));
    case 'date_asc':   return a.sort((x,y)=>new Date(x.date)-new Date(y.date));
    default: return a;
  }
}

function render(){
  const all=load();

  // Stats bar
  const total=all.length;
  const passed=all.filter(e=>e.passed).length;
  const failed=total-passed;
  const passRate=total?Math.round(passed/total*100):0;
  const bestScore=total?Math.max(...all.map(e=>e.score)):0;
  const fastestPass=all.filter(e=>e.passed);
  const fastest=fastestPass.length?Math.min(...fastestPass.map(e=>e.time)):null;
  document.getElementById('stats-bar').innerHTML=
    '<div class="stat-box s-total"><div class="sv">'+total+'</div><div class="sl">Total Attempts</div></div>'+
    '<div class="stat-box s-pass"><div class="sv">'+passed+'</div><div class="sl">Passed</div></div>'+
    '<div class="stat-box s-fail"><div class="sv">'+failed+'</div><div class="sl">Failed</div></div>'+
    '<div class="stat-box s-best"><div class="sv">'+passRate+'%</div><div class="sl">Pass Rate</div></div>'+
    (fastest!==null?'<div class="stat-box"><div class="sv" style="color:var(--blue)">'+fmtTime(fastest)+'</div><div class="sl">Best Time (Pass)</div></div>':'');

  const filtered=filter==='pass'?all.filter(e=>e.passed):filter==='fail'?all.filter(e=>!e.passed):all;
  const sorted=sortEntries(filtered);
  const wrap=document.getElementById('board-wrap');

  if(sorted.length===0){
    wrap.innerHTML=
      '<div class="empty">'+
      '<div class="empty-icon">''+'📋'+''</div>'+
      '<h2>''+(total===0?'No results yet':'No results match this filter')+'</h2>'+
      '<p>''+(total===0?'Take the test and your score will appear here automatically.':'Try a different filter to see results.')+'</p>'+
      '</div>';
    return;
  }

  let rows='';
  sorted.forEach((e,i)=>{
    const pill=e.passed
      ?'<span class="score-pill pass">'+e.score+'/'+e.total+' — Pass</span>'
      :'<span class="score-pill fail">'+e.score+'/'+e.total+' — Fail</span>';
    rows+='<tr>'+
      '<td>'+rankLabel(i)+'</td>'+
      '<td class="name-cell">'+escHtml(e.name||'Anonymous')+'</td>'+
      '<td>'+pill+'</td>'+
      '<td class="time-cell">'+fmtTime(e.time||0)+'</td>'+
      '<td class="date-cell">'+fmtDate(e.date)+'</td>'+
    '</tr>';
  });

  wrap.innerHTML=
    '<div class="table-wrap"><table>'+
    '<thead><tr><th>#</th><th>Name</th><th>Score</th><th>Time</th><th>Date</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>';
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSort(v){ sortBy=v; render(); }

function confirmClear(){
  document.getElementById('confirm-overlay').style.display='flex';
}
function cancelClear(){
  document.getElementById('confirm-overlay').style.display='none';
}
function doClear(){
  localStorage.removeItem(KEY);
  cancelClear();
  render();
}

render();
</script>
</body>
</html>
